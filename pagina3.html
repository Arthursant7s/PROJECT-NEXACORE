<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Multiplicação</title>
    <link rel="stylesheet" href="pagina3.css">
</head>
<body>

<div class="calculadora">
    <h1>Multiplicação</h1>

    <input type="number" id="num1" placeholder="Primeiro número">

    <div class="simbolo">×</div>

    <input type="number" id="num2" placeholder="Segundo número">

    <div class="botoes">
        <button id="calcular">Calcular</button>
        <button id="limpar">Limpar</button>
    </div>

    <div id="resultado"></div>

    <div id="historico">
        <h3>Histórico</h3>
    </div>
</div>

<script>
const calcular = document.getElementById("calcular");
const limpar = document.getElementById("limpar");
const resultado = document.getElementById("resultado");
const historico = document.getElementById("historico");

calcular.addEventListener("click", () => {
    const n1 = parseFloat(document.getElementById("num1").value);
    const n2 = parseFloat(document.getElementById("num2").value);

    if(isNaN(n1) || isNaN(n2)){
        resultado.textContent = "Digite os dois números!";
        return;
    }

    const total = n1 * n2;

    resultado.textContent = total;

    const item = document.createElement("p");
    item.textContent = `${n1} × ${n2} = ${total}`;

    historico.appendChild(item);
});

limpar.addEventListener("click", () => {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    resultado.textContent = "";
});
</script>

</body>
</html>
